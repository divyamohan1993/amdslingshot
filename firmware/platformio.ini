; PlatformIO configuration for JalNetra Sensor Node
; Target: Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)

[env:heltec_wifi_lora_32_V3]
platform = espressif32@6.9.0
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    sandeepmistry/LoRa@^0.8.0
    dfrobot/DFRobot_EC@^1.1.1
    Wire
    SPI

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLORA_FREQUENCY=866000000
    -DLORA_SPREADING_FACTOR=7
    -DLORA_BANDWIDTH=125000
    -DLORA_TX_POWER=20
    -DSENSOR_INTERVAL_MS=30000
    -DDEEP_SLEEP_INTERVAL_US=25000000
    -DNODE_ID=0x0001

board_build.partitions = min_spiffs.csv
