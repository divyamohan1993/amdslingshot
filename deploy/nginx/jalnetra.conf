# ---------------------------------------------------------------------------
# Main Server Block (HTTP - works without SSL)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenge (for certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/woff2;

    # --- Client Configuration ---
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # --- Proxy Buffering ---
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # --- Health Check (for load balancers / monitoring) ---
    location = /health {
        access_log off;
        proxy_pass http://jalnetra_backend/api/v1/health;
        proxy_set_header Host $host;
    }

    # --- API Endpoints ---
    location /api/ {
        limit_req zone=jalnetra_api burst=20 nodelay;

        proxy_pass http://jalnetra_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Keep-alive
        proxy_set_header Connection "";
    }

    # --- WebSocket Endpoint (real-time sensor data) ---
    location /ws/ {
        limit_req zone=jalnetra_ws burst=5 nodelay;

        proxy_pass http://jalnetra_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (longer for persistent connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # --- FastAPI Interactive Documentation ---
    location /docs {
        proxy_pass http://jalnetra_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://jalnetra_backend/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://jalnetra_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # --- Dashboard (React SPA served by FastAPI static files) ---
    location /dashboard {
        proxy_pass http://jalnetra_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static Assets (long-cache for hashed filenames) ---
    location /static/ {
        proxy_pass http://jalnetra_backend;
        proxy_set_header Host $host;

        # Cache hashed assets aggressively
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        proxy_pass http://jalnetra_backend;
        proxy_set_header Host $host;

        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Favicon and robots ---
    location = /favicon.ico {
        proxy_pass http://jalnetra_backend;
        expires 7d;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        return 200 "User-agent: *\nDisallow: /api/\nDisallow: /docs\nDisallow: /redoc\n";
    }

    # --- Root -> Dashboard ---
    location = / {
        return 302 /dashboard;
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Custom error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

