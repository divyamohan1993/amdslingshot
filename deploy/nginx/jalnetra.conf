# =============================================================================
# JalNetra - Nginx Reverse Proxy Configuration
# Proxies to FastAPI on port 8000 with WebSocket support, SSL, and caching.
# =============================================================================

# Rate limiting zone (10 requests/second per IP)
limit_req_zone $binary_remote_addr zone=jalnetra_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=jalnetra_ws:10m rate=5r/s;

# Upstream backend
upstream jalnetra_backend {
    server jalnetra-api:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect (uncomment when SSL is configured)
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     listen [::]:80;
#     server_name your-domain.com;
